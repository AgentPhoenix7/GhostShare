<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GhostShare | Secure File Transfer</title>
    <link href="/style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Fallback for backdrop-blur if browser doesn't support it well */
        @supports not (backdrop-filter: blur(1px)) {
            .glass { background-color: rgba(255, 255, 255, 0.9) !important; }
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 relative overflow-x-hidden flex flex-col">
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute top-0 -right-40 w-96 h-96 bg-cyan-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-40 left-20 w-96 h-96 bg-pink-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
</div>
<div class="container mx-auto px-4 py-12 md:py-20 grow flex items-center justify-center">
    <div class="glass w-full max-w-4xl bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 md:p-12 shadow-[0_0_60px_-15px_rgba(0,0,0,0.3)]">
        <div class="text-center mb-12 border-b border-white/10 pb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-linear-to-r from-cyan-400 via-blue-500 to-purple-600">
                GhostShare
            </h1>
            <p class="mt-4 text-lg text-slate-300 max-w-lg mx-auto">
                Secure, ephemeral, burn-after-reading file transfer.
                Upload, share the code, download once. Wiped immediately.
            </p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="flex items-center gap-3">
                    <div class="p-2.5 rounded-xl bg-blue-500/10 border border-blue-500/20 text-blue-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Drop a File</h2>
                </div>
                <form id="uploadForm" class="space-y-5">
                    <div class="relative group">
                        <label for="fileInput" class="flex flex-col items-center justify-center w-full h-24 px-4 bg-white/5 border-2 border-dashed border-white/20 rounded-xl cursor-pointer hover:bg-white/10 hover:border-white/40 transition duration-200 group">
                            <div class="flex flex-col items-center justify-center pt-2 pb-3">
                                <svg class="w-6 h-6 mb-2 text-slate-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <p class="text-sm text-slate-400 group-hover:text-slate-300" id="fileNameDisplay">
                                    <span class="font-semibold text-blue-400">Click to browse</span> or drag and drop
                                </p>
                            </div>
                            <input id="fileInput" type="file" class="hidden" required>
                        </label>
                    </div>
                    <div class="relative">
                        <label for="uploadPassphrase"></label><input type="password" id="uploadPassphrase" placeholder="Optional passphrase" class="w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
                    </div>
                    <button type="submit" id="uploadBtn" class="w-full text-center bg-linear-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-300 transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                        <span>Upload File (Max 200MB)</span>
                    </button>
                </form>
                <div id="uploadStatus" class="p-4 rounded-xl text-sm font-medium hidden"></div>
            </div>
            <div class="space-y-6 border-t md:border-t-0 md:border-l border-white/10 pt-10 md:pt-0 md:pl-10">
                <div class="flex items-center gap-3">
                    <div class="p-2.5 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Receive File</h2>
                </div>
                <form id="downloadForm" class="space-y-5">
                    <div class="relative">
                        <label for="redeemCode"></label><input type="text" id="redeemCode" placeholder="Enter 6-digit code" maxlength="6" class="w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder:text-slate-500 placeholder:tracking-normal placeholder:font-sans placeholder:text-base text-center text-2xl font-mono tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200" required>
                    </div>
                    <div class="relative">
                        <label for="redeemPassphrase"></label><input type="password" id="redeemPassphrase" placeholder="Passphrase (if secured)" class="w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200">
                    </div>
                    <button type="submit" id="downloadBtn" class="w-full text-center bg-linear-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-300 transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                        <span>Download & Destroy</span>
                    </button>
                </form>
                <div id="downloadStatus" class="p-4 rounded-xl text-sm font-medium hidden"></div>
            </div>
        </div>
    </div>
</div>
<footer class="py-6 border-t border-white/5 relative z-10 text-center glass bg-white/2 backdrop-blur-sm">
    <p class="text-sm text-slate-500">
        &copy; 2026 GhostShare. Files are automatically deleted after 24 hours or immediate download.
    </p>
</footer>
<script>
    // Helper to display status messages dynamically
    const setStatus = (elementId, message, type) => {
        const el = document.getElementById(elementId);
        el.innerHTML = message;
        el.classList.remove('hidden', 'bg-red-500/10', 'text-red-400', 'border-red-500/20', 'bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/20', 'bg-blue-500/10', 'text-blue-400', 'border-blue-500/20');
        el.classList.add('border');

        if (type === 'error') {
            el.classList.add('bg-red-500/10', 'text-red-400', 'border-red-500/20');
        } else if (type === 'success') {
            el.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/20');
        } else {
            el.classList.add('bg-blue-500/10', 'text-blue-400', 'border-blue-500/20');
        }
    };

    // Update dropzone text on file select
    document.getElementById('fileInput').addEventListener('change', function (e) {
        const display = document.getElementById('fileNameDisplay');
        if (e.target.files && e.target.files.length > 0) {
            // Show selected file name
            display.innerHTML = `<span class="font-semibold text-blue-400">${e.target.files[0].name}</span>`;
        } else {
            // Revert back if they cancel
            display.innerHTML = '<span class="font-semibold text-blue-400">Click to browse</span> or drag and drop';
        }
    });

    // Handle file upload
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const statusId = 'uploadStatus';
        const fileInput = document.getElementById('fileInput');
        const passphrase = document.getElementById('uploadPassphrase').value;
        const btn = document.getElementById('uploadBtn');

        if (fileInput.files.length === 0) return;
        if (fileInput.files[0].size > 200 * 1024 * 1024) {
            setStatus(statusId, 'Error: File exceeds 200MB limit.', 'error');
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        if (passphrase) formData.append('passphrase', passphrase);

        setStatus(statusId, 'Uploading and encrypting file...', 'info');
        btn.disabled = true;
        btn.classList.add('opacity-70', 'cursor-not-allowed');

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();

            if (!response.ok) throw new Error(data.error || 'Upload failed');

            const successMsg = `
            <div class="text-center space-y-2">
                <div class="text-lg font-bold">Upload Successful!</div>
                <div class="text-sm text-slate-300">Share this code with the recipient:</div>
                <button type="button" onclick="navigator.clipboard.writeText('${data.code}'); this.innerHTML='Copied!'; setTimeout(() => this.innerHTML='${data.code}', 2000);" class="font-mono text-4xl font-bold tracking-[0.3em] text-white bg-white/5 hover:bg-white/10 py-3 px-6 rounded-lg border border-white/10 mt-2 transition duration-200 cursor-pointer w-full" title="Click to copy">
                    ${data.code}
                </button>
            </div>
            `;
            setStatus(statusId, successMsg, 'success');
            e.target.reset(); // Clear form
        } catch (error) {
            setStatus(statusId, `Error: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.classList.remove('opacity-70', 'cursor-not-allowed');
        }
    });

    // Handle file download
    document.getElementById('downloadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const statusId = 'downloadStatus';
        const code = document.getElementById('redeemCode').value.trim();
        const passphrase = document.getElementById('redeemPassphrase').value;
        const btn = document.getElementById('downloadBtn');

        setStatus(statusId, 'Locating file and verifying code...', 'info');
        btn.disabled = true;
        btn.classList.add('opacity-70', 'cursor-not-allowed');

        try {
            const response = await fetch('/redeem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, passphrase })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error || 'Download failed');
            }

            // Extract original filename from headers
            let filename = 'downloaded_file';
            const disposition = response.headers.get('Content-Disposition');
            if (disposition && disposition.includes('filename=')) {
                const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(disposition);
                if (matches != null && matches[1]) {
                    filename = matches[1].replace(/['"]/g, '');
                }
            }

            setStatus(statusId, 'File found! Preparing download...', 'info');

            // Create a blob from the response
            const blob = await response.blob();

            // Create a temporary link to trigger the download
            const downloadUrl = window.URL.createObjectURL(blob);

            // Create invisible anchor and click it to trigger native save dialog
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();

            // Clean up
            window.URL.revokeObjectURL(downloadUrl);
            document.body.removeChild(a);

            setStatus(statusId, 'Download started. The file has been wiped from server.', 'success');
            e.target.reset(); // Clear form
        } catch (error) {
            setStatus(statusId, `Error: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.classList.remove('opacity-70', 'cursor-not-allowed');
        }
    });
</script>
</body>
</html>
